name: Release desktop app

# Triggered on v*.*.* tag push. Builds signed Tauri bundles for every desktop
# platform, creates a draft GitHub release with the bundles + latest.json
# update manifest attached, and publishes once all matrix jobs succeed.
#
# The app's updater plugin points at this release's latest.json, so any
# already-installed copy of Parley will pick up the new version on next launch.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — contents of the minisign private key
#                                         (~/.tauri/parley-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — password for that key (may be empty)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-24.04
            args: ""
            rust-targets: ""
          - platform: ubuntu-24.04-arm
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    env:
      VITE_SITE_URL: https://parley.byexec.com

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Linux deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm \
            xdg-utils

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (pinned 2026-03-27)
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build + sign + upload
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0 (peeled annotated tag, 2026-03-14)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SITE_URL: https://parley.byexec.com
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: Parley ${{ github.ref_name }}
          releaseBody: See the assets below to download this version. Installed copies auto-update on next launch.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            // getReleaseByTag 404s on drafts (the tag isn't bound to the ref
            // until the release is published), so list recent releases and
            // match on tag_name instead.
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 30,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              throw new Error(`No release found for tag ${tag}`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });

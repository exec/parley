name: Build Linux desktop app

# Builds the Tauri desktop app for Linux as unsigned .deb and .rpm packages
# (x86_64 only for now). Runs on push to main when desktop/ or frontend/
# changes, and on manual dispatch. Output lands as workflow artifacts; no
# secrets required.
#
# Ubuntu 24.04 is required for webkit2gtk-4.1, which Tauri v2 needs.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-linux.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-linux.yml"

permissions:
  contents: read

concurrency:
  group: desktop-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build .deb and .rpm (x86_64)
    runs-on: ubuntu-24.04
    env:
      VITE_SITE_URL: https://parley.byexec.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build Tauri (deb + rpm)
        working-directory: desktop
        run: npx tauri build --bundles deb,rpm

      - name: Collect .deb and .rpm
        id: collect
        run: |
          DEB=$(ls desktop/src-tauri/target/release/bundle/deb/*.deb | head -1)
          RPM=$(ls desktop/src-tauri/target/release/bundle/rpm/*.rpm | head -1)
          if [ -z "$DEB" ] || [ -z "$RPM" ]; then
            echo "::error::Missing .deb or .rpm" >&2
            exit 1
          fi
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM" >> "$GITHUB_OUTPUT"
          echo "deb-name=$(basename "$DEB")" >> "$GITHUB_OUTPUT"
          echo "rpm-name=$(basename "$RPM")" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.deb-name }}
          path: ${{ steps.collect.outputs.deb }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.rpm-name }}
          path: ${{ steps.collect.outputs.rpm }}
          if-no-files-found: error
          retention-days: 30

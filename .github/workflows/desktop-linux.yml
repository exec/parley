name: Build Linux desktop app

# Builds the Tauri desktop app for Linux as unsigned .deb and .rpm packages
# for both x86_64 and aarch64. Each architecture runs natively on its own
# runner (GitHub Actions' ubuntu-24.04 and ubuntu-24.04-arm) so we don't have
# to cross-compile webkit2gtk. Runs on push to main when desktop/ or frontend/
# changes, and on manual dispatch. Output lands as workflow artifacts; no
# secrets required.
#
# Ubuntu 24.04 is required for webkit2gtk-4.1, which Tauri v2 needs.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-linux.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-linux.yml"

permissions:
  contents: read

concurrency:
  group: desktop-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build .deb + .rpm (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    env:
      VITE_SITE_URL: https://parley.byexec.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build Tauri (deb + rpm)
        working-directory: desktop
        run: npx tauri build --bundles deb,rpm

      # Rewrite the .deb Depends so the package installs on Debian trixie+ as
      # well as Ubuntu 24.04+. Both libgtk-3-0 and libwebkit2gtk-4.1-0 were
      # renamed with a "t64" suffix during Debian's time64 transition, and
      # Tauri's auto-detected deps hard-code the pre-transition names. The
      # tauri.conf.json "depends" override only *appends* to the list, so the
      # original (broken) names still appear — we fix it up after the build.
      - name: Fix .deb Depends for Debian t64 transition
        run: |
          DEB=$(ls desktop/src-tauri/target/release/bundle/deb/*.deb | head -1)
          WORKDIR=$(mktemp -d)
          dpkg-deb -R "$DEB" "$WORKDIR/extracted"
          echo "--- before:"
          grep -i '^Depends' "$WORKDIR/extracted/DEBIAN/control"
          sed -i 's#^Depends:.*#Depends: libwebkit2gtk-4.1-0 | libwebkit2gtk-4.1-0t64, libgtk-3-0 | libgtk-3-0t64#' "$WORKDIR/extracted/DEBIAN/control"
          dpkg-deb -b "$WORKDIR/extracted" "$DEB"
          echo "--- after:"
          dpkg-deb -f "$DEB" Depends

      # Surface the .rpm's requirements in the build log so we can tell whether
      # Fedora/RHEL targets need the same kind of alternatives wrangling.
      - name: Inspect .rpm requirements
        run: |
          RPM=$(ls desktop/src-tauri/target/release/bundle/rpm/*.rpm | head -1)
          sudo apt-get install -y rpm >/dev/null
          echo "--- Requires:"
          rpm -qpR "$RPM" || true

      - name: Collect .deb and .rpm
        id: collect
        run: |
          DEB=$(ls desktop/src-tauri/target/release/bundle/deb/*.deb | head -1)
          RPM=$(ls desktop/src-tauri/target/release/bundle/rpm/*.rpm | head -1)
          if [ -z "$DEB" ] || [ -z "$RPM" ]; then
            echo "::error::Missing .deb or .rpm" >&2
            exit 1
          fi
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM" >> "$GITHUB_OUTPUT"
          echo "deb-name=$(basename "$DEB")" >> "$GITHUB_OUTPUT"
          echo "rpm-name=$(basename "$RPM")" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.deb-name }}
          path: ${{ steps.collect.outputs.deb }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.rpm-name }}
          path: ${{ steps.collect.outputs.rpm }}
          if-no-files-found: error
          retention-days: 30

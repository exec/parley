name: Infrastructure (deprecated — DigitalOcean)

# DEPRECATED: Parley moved to self-hosted Proxmox infrastructure. This workflow
# targeted DigitalOcean droplets/Spaces and is kept for historical reference
# only. The `enabled` gate below makes every run a no-op. To re-enable, set
# repository variable ENABLE_DO_INFRA=true (and make sure the DO account,
# secrets, and state backend still exist).

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
          - import
          - backup-db
          - restore-db
          - diagnose
  # Disabled auto-apply on push — use manual triggers only
  # push:
  #   branches: [main]
  #   paths:
  #     - "terraform/**"

# Required GitHub secrets (set via gh secret set or the Actions UI):
#
#   DO_TOKEN                  — DigitalOcean API token
#   CLOUDFLARE_API_KEY        — Cloudflare API token (zone:read + dns:edit)
#   DB_PASSWORD               — PostgreSQL parley user password
#   JWT_SECRET                — JWT signing secret
#   SPACES_ACCESS_KEY         — DO Spaces access key (used for state backend + app)
#   SPACES_SECRET_KEY         — DO Spaces secret key
#   SPACES_CDN_URL            — DO Spaces CDN base URL
#   BREVO_API_KEY             — Brevo transactional email API key
#   ADMIN_JWT_SECRET          — Admin panel JWT secret
#   IMPERSONATION_JWT_SECRET  — JWT signing key for admin-minted impersonation
#                               tokens (must differ from JWT_SECRET)
#   LIVEKIT_API_KEY           — LiveKit API key
#   LIVEKIT_API_SECRET        — LiveKit API secret
#   GIPHY_API_KEY             — Giphy API key
#   OLLAMA_API_KEY            — Ollama API key
#   BOT_KEY_SECRET            — Bot API key encryption secret
#   REDIS_PASSWORD            — Redis auth password
#   ADMIN_ALLOWED_IP          — CIDR for admin access (e.g. 1.2.3.4/32)
#   SSH_PUBLIC_KEY            — SSH public key content for droplet access
#   REPO_URL                  — Git repo URL (e.g. https://github.com/exec/parley.git)
#
# Remote state: stored in DO Spaces bucket "parley-prod" at terraform-state/terraform.tfstate
# First-time setup: run `terraform init -migrate-state` locally to push existing local state.

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    # Deprecated: gated behind repository variable. No-op unless explicitly enabled.
    if: ${{ vars.ENABLE_DO_INFRA == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    env:
      # Cloudflare provider reads CLOUDFLARE_API_TOKEN automatically
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}

      # DO Spaces S3-compatible backend credentials
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      # Terraform variables — sensitive
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_spaces_access_key: ${{ secrets.SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      TF_VAR_spaces_cdn_url: ${{ secrets.SPACES_CDN_URL }}
      TF_VAR_brevo_api_key: ${{ secrets.BREVO_API_KEY }}
      TF_VAR_admin_jwt_secret: ${{ secrets.ADMIN_JWT_SECRET }}
      TF_VAR_impersonation_jwt_secret: ${{ secrets.IMPERSONATION_JWT_SECRET }}
      TF_VAR_livekit_api_key: ${{ secrets.LIVEKIT_API_KEY }}
      TF_VAR_livekit_api_secret: ${{ secrets.LIVEKIT_API_SECRET }}
      TF_VAR_giphy_api_key: ${{ secrets.GIPHY_API_KEY }}
      TF_VAR_ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}
      TF_VAR_bot_key_secret: ${{ secrets.BOT_KEY_SECRET }}
      TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
      TF_VAR_admin_allowed_ip: ${{ secrets.ADMIN_ALLOWED_IP }}

      # Terraform variables — non-sensitive
      TF_VAR_region: "nyc3"
      TF_VAR_api_droplet_size: "s-1vcpu-2gb"
      TF_VAR_db_droplet_size: "s-2vcpu-4gb"
      TF_VAR_api_count: "2"
      TF_VAR_domain_name: ${{ vars.DOMAIN }}
      TF_VAR_spaces_bucket: "parley-prod"
      TF_VAR_spaces_endpoint: "https://nyc3.digitaloceanspaces.com"
      TF_VAR_brevo_from_email: noreply@${{ vars.DOMAIN }}
      TF_VAR_site_url: https://${{ vars.DOMAIN }}
      TF_VAR_livekit_url: "wss://parley-6jjbl5wy.livekit.cloud"
      TF_VAR_ollama_api_url: "https://ollama.com"
      TF_VAR_ollama_model: "devstral-small-2:24b-cloud"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: "~1.7"

      - name: Write SSH public key
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          REPO_URL: ${{ secrets.REPO_URL }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PUBLIC_KEY" > ~/.ssh/id_ed25519.pub
          chmod 644 ~/.ssh/id_ed25519.pub
          # Private key not needed in CI (no provisioner connections during apply)
          touch ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "TF_VAR_ssh_public_key=$HOME/.ssh/id_ed25519.pub" >> "$GITHUB_ENV"
          echo "TF_VAR_ssh_private_key=$HOME/.ssh/id_ed25519" >> "$GITHUB_ENV"
          echo "TF_VAR_repo_url=$REPO_URL" >> "$GITHUB_ENV"

      - name: Detect Cloudflare zone for domain
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          # Fetch zones — capture HTTP status for debugging
          HTTP_CODE=$(curl -s -o /tmp/cf_zones.json -w "%{http_code}" \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?per_page=100")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Cloudflare API returned HTTP $HTTP_CODE"
            echo "Response:"
            jq '.errors // .messages // "unknown error"' /tmp/cf_zones.json 2>/dev/null || cat /tmp/cf_zones.json
            echo ""
            echo "Check that CLOUDFLARE_API_KEY is a valid API Token with Zone:Read permission."
            exit 1
          fi

          CF_ZONE=$(jq -r --arg d "$DOMAIN" \
            '.result[] | . as $z | select(($d == $z.name) or ($d | endswith("." + $z.name))) | .name' \
            /tmp/cf_zones.json | head -1)

          if [ -z "$CF_ZONE" ]; then
            echo "ERROR: No Cloudflare zone found matching $DOMAIN"
            echo "Available zones:"
            jq -r '.result[].name' /tmp/cf_zones.json 2>/dev/null || echo "(none)"
            exit 1
          fi
          echo "Resolved zone: $CF_ZONE"
          echo "TF_VAR_cf_zone=$CF_ZONE" >> "$GITHUB_ENV"
          rm -f /tmp/cf_zones.json

      - name: Terraform Init
        env:
          SPACES_ACCESS_KEY: ${{ secrets.SPACES_ACCESS_KEY }}
          SPACES_SECRET_KEY: ${{ secrets.SPACES_SECRET_KEY }}
        run: |
          terraform init \
            -backend-config="access_key=$SPACES_ACCESS_KEY" \
            -backend-config="secret_key=$SPACES_SECRET_KEY"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy' && github.event.inputs.action != 'import'
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        if: >
          github.event.inputs.action != 'destroy' &&
          github.event.inputs.action != 'import' &&
          (github.event.inputs.action == 'apply' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "⚠️  DESTROYING ALL PARLEY INFRASTRUCTURE"
          terraform plan -destroy -no-color -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Terraform Import (sync state with existing resources)
        if: github.event.inputs.action == 'import'
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          echo "=== Discovering existing DigitalOcean resources ==="

          # VPC
          VPC_ID=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/vpcs?per_page=50" \
            | jq -r '.vpcs[] | select(.name == "parley-vpc") | .id')
          if [ -n "$VPC_ID" ]; then
            echo "Importing VPC: $VPC_ID"
            terraform import digitalocean_vpc.parley_vpc "$VPC_ID" || true
          fi

          # SSH Key (match any name containing "parley")
          KEY_ID=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/account/keys?per_page=50" \
            | jq -r '.ssh_keys[] | select(.name | test("parley"; "i")) | .id' | head -1)
          if [ -n "$KEY_ID" ]; then
            echo "Importing SSH key: $KEY_ID"
            terraform import digitalocean_ssh_key.parley_key "$KEY_ID" || true
          fi

          # Project (match any name containing "parley")
          PROJ_ID=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/projects?per_page=50" \
            | jq -r '.projects[] | select(.name | test("parley"; "i")) | .id' | head -1)
          if [ -n "$PROJ_ID" ]; then
            echo "Importing project: $PROJ_ID"
            terraform import digitalocean_project.parley_project "$PROJ_ID" || true
          fi

          # Cloudflare DNS record — uses CLOUDFLARE_API_TOKEN (set at job level)
          CF_ZONE_ID=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?per_page=100" \
            | jq -r --arg z "$TF_VAR_cf_zone" '.result[] | select(.name == $z) | .id')
          if [ -n "$CF_ZONE_ID" ]; then
            REC_ID=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=${TF_VAR_domain_name}&type=A" \
              | jq -r '.result[0].id // empty')
            if [ -n "$REC_ID" ]; then
              echo "Importing Cloudflare DNS record: $CF_ZONE_ID/$REC_ID"
              terraform import cloudflare_record.parley_a "$CF_ZONE_ID/$REC_ID" || true
            else
              echo "No A record found for ${TF_VAR_domain_name}"
            fi
          else
            echo "Could not resolve Cloudflare zone ID for $TF_VAR_cf_zone"
          fi

          # Droplets (tagged 'parley')
          DROPLETS=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=parley&per_page=50")

          # DB droplet (tag is "database" not "db")
          DB_ID=$(echo "$DROPLETS" | jq -r '.droplets[] | select(.tags | contains(["database"])) | .id' | head -1)
          if [ -n "$DB_ID" ]; then
            echo "Importing DB droplet: $DB_ID"
            terraform state rm digitalocean_droplet.parley_db 2>/dev/null || true
            terraform import digitalocean_droplet.parley_db "$DB_ID" || true
          fi

          # API droplets
          API_IDS=$(echo "$DROPLETS" | jq -r '.droplets[] | select(.tags | contains(["api"])) | .id')
          IDX=0
          for ID in $API_IDS; do
            echo "Importing API droplet[$IDX]: $ID"
            terraform import "digitalocean_droplet.parley_api[$IDX]" "$ID" || true
            IDX=$((IDX + 1))
          done

          # Admin droplet
          ADMIN_ID=$(echo "$DROPLETS" | jq -r '.droplets[] | select(.tags | contains(["admin"])) | .id')
          if [ -n "$ADMIN_ID" ]; then
            echo "Importing admin droplet: $ADMIN_ID"
            terraform import digitalocean_droplet.parley_admin "$ADMIN_ID" || true
          fi

          # Load Balancer
          LB_ID=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/load_balancers?per_page=50" \
            | jq -r '.load_balancers[] | select(.name == "parley-lb") | .id')
          if [ -n "$LB_ID" ]; then
            echo "Importing load balancer: $LB_ID"
            terraform import digitalocean_loadbalancer.parley_lb "$LB_ID" || true
          fi

          # Firewalls — DO names map to TF resource names
          FW_LIST=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/firewalls?per_page=50")
          for pair in "parley-api-fw:parley_api" "parley-db-fw:parley_db" "parley-admin-fw:parley_admin"; do
            FW_DO_NAME="${pair%%:*}"
            FW_TF_NAME="${pair##*:}"
            FW_ID=$(echo "$FW_LIST" | jq -r --arg n "$FW_DO_NAME" '.firewalls[] | select(.name == $n) | .id')
            if [ -n "$FW_ID" ]; then
              echo "Importing firewall $FW_DO_NAME -> $FW_TF_NAME: $FW_ID"
              terraform import "digitalocean_firewall.${FW_TF_NAME}" "$FW_ID" || true
            fi
          done

          echo "=== Import complete. Run 'plan' to see drift. ==="

      - name: Backup database
        if: github.event.inputs.action == 'backup-db'
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Find DB server IP
          DB_IP=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=parley&per_page=50" \
            | jq -r '.droplets[] | select(.tags | contains(["database"])) | .networks.v4[] | select(.type=="public") | .ip_address')

          if [ -z "$DB_IP" ]; then
            echo "ERROR: Could not find DB droplet"
            exit 1
          fi
          echo "DB server: $DB_IP"

          # Allowlist runner IP in DB firewall
          RUNNER_IP=$(curl -sf https://ifconfig.me)/32
          FW_DB_ID=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/firewalls?per_page=50" \
            | jq -r '.firewalls[] | select(.name == "parley-db-fw") | .id')

          RULE=$(jq -n --arg ip "$RUNNER_IP" '{
            "inbound_rules": [{"protocol": "tcp", "ports": "22", "sources": {"addresses": [$ip]}}]
          }')
          curl -sf -X POST -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_DB_ID/rules"
          sleep 5

          # SSH in and dump
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DB_IP" >> ~/.ssh/known_hosts

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "=== Running pg_dump ==="
          ssh -i ~/.ssh/deploy_key "root@$DB_IP" \
            "sudo -u postgres pg_dump -Fc parley" > "parley-${TIMESTAMP}.dump"

          SIZE=$(du -h "parley-${TIMESTAMP}.dump" | cut -f1)
          echo "Backup complete: parley-${TIMESTAMP}.dump ($SIZE)"

          # Upload to Spaces
          echo "=== Uploading to DO Spaces ==="
          aws s3 cp "parley-${TIMESTAMP}.dump" \
            "s3://parley-prod/backups/parley-${TIMESTAMP}.dump" \
            --endpoint-url https://nyc3.digitaloceanspaces.com
          echo "Uploaded to s3://parley-prod/backups/parley-${TIMESTAMP}.dump"

          # Clean up firewall rule
          curl -sf -X DELETE -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_DB_ID/rules" || true
          rm -f ~/.ssh/deploy_key

      - name: Upload backup as workflow artifact
        if: github.event.inputs.action == 'backup-db'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: parley-db-dump
          path: terraform/parley-*.dump
          retention-days: 7
          if-no-files-found: error

      - name: Restore database from latest backup
        if: github.event.inputs.action == 'restore-db'
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SPACES_ACCESS_KEY: ${{ secrets.SPACES_ACCESS_KEY }}
          SPACES_SECRET_KEY: ${{ secrets.SPACES_SECRET_KEY }}
        run: |
          # Find an API server to use as jump host (has Spaces creds + DB access)
          API_IP=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=parley&per_page=50" \
            | jq -r '.droplets[] | select(.tags | contains(["api"])) | .networks.v4[] | select(.type=="public") | .ip_address' | head -1)
          echo "Using API server: $API_IP"

          # Allowlist runner
          RUNNER_IP=$(curl -sf https://ifconfig.me)/32
          FW_API_ID=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/firewalls?per_page=50" \
            | jq -r '.firewalls[] | select(.name == "parley-api-fw") | .id')
          RULE=$(jq -n --arg ip "$RUNNER_IP" '{"inbound_rules": [{"protocol": "tcp", "ports": "22", "sources": {"addresses": [$ip]}}]}')
          curl -sf -X POST -H "Authorization: Bearer $DO_TOKEN" -H "Content-Type: application/json" -d "$RULE" "https://api.digitalocean.com/v2/firewalls/$FW_API_ID/rules"
          sleep 5

          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config
          ssh-keyscan -H "$API_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Find largest backup (most likely the one with real data)
          LATEST=$(AWS_ACCESS_KEY_ID=$SPACES_ACCESS_KEY AWS_SECRET_ACCESS_KEY=$SPACES_SECRET_KEY \
            aws s3 ls s3://parley-prod/backups/ --endpoint-url https://nyc3.digitaloceanspaces.com \
            | sort -k3 -n -r | head -1 | awk '{print $4}')
          echo "Restoring: $LATEST"

          # SSH to API server, download backup, restore to DB
          # Download backup on the runner first, then SCP to API server
          AWS_ACCESS_KEY_ID=$SPACES_ACCESS_KEY AWS_SECRET_ACCESS_KEY=$SPACES_SECRET_KEY \
            aws s3 cp "s3://parley-prod/backups/$LATEST" /tmp/parley-restore.dump \
              --endpoint-url https://nyc3.digitaloceanspaces.com
          echo "Downloaded: $(du -h /tmp/parley-restore.dump | cut -f1)"
          scp -i ~/.ssh/deploy_key /tmp/parley-restore.dump "root@$API_IP:/tmp/parley-restore.dump"

          ssh -i ~/.ssh/deploy_key root@$API_IP "bash -s" <<RESTORESCRIPT
            set -e
            echo "=== Installing pg tools ==="
            for i in 1 2 3; do
              which pg_restore > /dev/null 2>&1 && break
              apt-get install -y postgresql-client > /dev/null 2>&1 && break
              echo "Retry \$i..."
              sleep 10
            done
            echo "=== Restoring ==="
            DB_URL=\$(grep ^DATABASE_URL= /etc/parley/env | cut -d= -f2-)
            pg_restore --clean --if-exists -d "\$DB_URL" /tmp/parley-restore.dump 2>&1 | tail -10 || true
            echo "=== Verifying ==="
            psql "\$DB_URL" -c "SELECT count(*) AS user_count FROM users;" 2>&1
            rm -f /tmp/parley-restore.dump
            echo "=== Restore complete ==="
          RESTORESCRIPT

          # Cleanup
          curl -sf -X DELETE -H "Authorization: Bearer $DO_TOKEN" -H "Content-Type: application/json" -d "$RULE" "https://api.digitalocean.com/v2/firewalls/$FW_API_ID/rules" || true
          rm -f ~/.ssh/deploy_key

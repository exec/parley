name: Build macOS desktop app

# Builds the Tauri-based Parley desktop app as an unsigned universal .dmg
# installer. Runs on push to main when desktop/ or frontend/ changes, and on
# manual dispatch. Output lands as a workflow artifact; no secrets are
# required or referenced.
#
# Why unsigned: signing + notarization needs an Apple Developer cert stored
# in secrets. When you're ready to ship publicly, add those as repo secrets
# and extend this workflow with the sign/notarize steps.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-macos.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-macos.yml"

permissions:
  contents: read

concurrency:
  group: desktop-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build universal .dmg
    runs-on: macos-14  # Apple Silicon; we cross-compile x86_64 via rustup target
    env:
      # Public URL the built app talks to. Not a secret. Override via
      # workflow_dispatch inputs if a branch wants to point elsewhere.
      VITE_SITE_URL: https://parley.byexec.com

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (pinned 2026-03-27)
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          workspaces: desktop/src-tauri -> target

      # npm install (rather than npm ci) to tolerate small lockfile drift
      # across npm versions — the local dev machine may write slightly
      # different optional-dep entries than the runner's npm.
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build Tauri (universal .dmg)
        working-directory: desktop
        run: npx tauri build --bundles dmg --target universal-apple-darwin

      - name: Collect .dmg
        id: collect
        run: |
          DMG=$(ls desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No .dmg produced" >&2
            exit 1
          fi
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "dmg-name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ steps.collect.outputs.dmg-name }}
          path: ${{ steps.collect.outputs.dmg }}
          if-no-files-found: error
          retention-days: 30

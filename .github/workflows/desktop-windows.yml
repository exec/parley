name: Build Windows desktop app

# Builds the Tauri desktop app for Windows as an unsigned .msi installer
# (x86_64). Runs on push to main when desktop/ or frontend/ changes, and on
# manual dispatch. Output lands as a workflow artifact; no secrets required.
#
# WebView2 runtime is fetched by the MSI at install time (downloadBootstrapper
# default), so the installer stays small.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-windows.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "frontend/**"
      - ".github/workflows/desktop-windows.yml"

permissions:
  contents: read

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build .msi (x86_64)
    runs-on: windows-latest
    env:
      VITE_SITE_URL: https://parley.byexec.com

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (pinned 2026-03-27)

      - name: Cache cargo build
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build Tauri (msi)
        working-directory: desktop
        # `-c` overrides tauri.conf.json's createUpdaterArtifacts → skips the
        # signed updater bundle this workflow has no private key for. The
        # plain .msi still builds; release.yml ships the signed updater.
        # Single-quoted JSON survives both pwsh (default) and bash.
        run: npx tauri build --bundles msi -c '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Collect .msi
        id: collect
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path desktop/src-tauri/target/release/bundle/msi -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No .msi produced"
            exit 1
          }
          "msi=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msi-name=$($msi.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload .msi artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ steps.collect.outputs.msi-name }}
          path: ${{ steps.collect.outputs.msi }}
          if-no-files-found: error
          retention-days: 30

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    env:
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DO_TOKEN: ${{ secrets.DO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve API server IPs from DigitalOcean tags
        run: |
          HOSTS=$(curl -sf \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=api&per_page=50" \
            | python3 -c "
import json, sys
data = json.load(sys.stdin)
for d in data['droplets']:
    if 'parley' in d['tags']:
        for n in d['networks']['v4']:
            if n['type'] == 'public':
                print(n['ip_address'])
")
          echo "DEPLOY_HOSTS=$HOSTS" >> "$GITHUB_ENV"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOSTS >> ~/.ssh/known_hosts

      - name: Deploy to all servers
        run: |
          for IP in $DEPLOY_HOSTS; do
            ssh -i ~/.ssh/deploy_key root@$IP '
              set -e
              cd /parley && git pull origin main
              go build -mod=mod -o /usr/local/bin/parley-api ./cmd/api
              cd frontend && npm run build && cp -r dist/* /var/www/parley/
              systemctl restart parley-api
              echo OK
            ' &
          done
          wait

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

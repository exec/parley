name: Deploy (deprecated — DigitalOcean)

# DEPRECATED: targets DigitalOcean droplets, which Parley has moved off of in
# favor of self-hosted Proxmox. Kept for historical reference. Push trigger
# removed and the job is gated behind repository variable ENABLE_DO_INFRA so
# nothing runs by default.

on:
  workflow_dispatch:  # Manual-only; still a no-op unless ENABLE_DO_INFRA=true.

jobs:
  deploy:
    name: Deploy to production
    if: ${{ vars.ENABLE_DO_INFRA == 'true' }}
    runs-on: ubuntu-latest
    # Requires manual approval before deploying. Configure the "production"
    # environment in GitHub repo Settings > Environments with required reviewers.
    environment: production
    env:
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DO_TOKEN: ${{ secrets.DO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve server IPs from DigitalOcean tags
        run: |
          ALL=$(curl -sf \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=parley&per_page=50" \
            | jq -r '.droplets[] | {tags: .tags, ip: (.networks.v4[] | select(.type=="public") | .ip_address)}')
          API_HOSTS=$(echo "$ALL" | jq -r 'select(.tags | contains(["api"])) | .ip' | tr '\n' ' ')
          ADMIN_HOST=$(echo "$ALL" | jq -r 'select(.tags | contains(["admin"])) | .ip' | head -1 | tr -d '[:space:]')
          echo "API_HOSTS=$API_HOSTS" >> "$GITHUB_ENV"
          echo "ADMIN_HOST=$ADMIN_HOST" >> "$GITHUB_ENV"

      - name: Allowlist runner IP in DO firewalls
        run: |
          RUNNER_IP=$(curl -sf https://ifconfig.me)/32
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"

          FW_LIST=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/firewalls?per_page=50")
          FW_API_ID=$(echo "$FW_LIST" | jq -r '.firewalls[] | select(.name == "parley-api-fw") | .id')
          FW_ADMIN_ID=$(echo "$FW_LIST" | jq -r '.firewalls[] | select(.name == "parley-admin-fw") | .id')
          echo "FW_API_ID=$FW_API_ID" >> "$GITHUB_ENV"
          echo "FW_ADMIN_ID=$FW_ADMIN_ID" >> "$GITHUB_ENV"

          RULE=$(jq -n --arg ip "$RUNNER_IP" '{
            "inbound_rules": [{"protocol": "tcp", "ports": "22", "sources": {"addresses": [$ip]}}]
          }')

          curl -sf -X POST \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_API_ID/rules"

          curl -sf -X POST \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_ADMIN_ID/rules"

          # Wait for firewall rules to propagate
          sleep 5

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Accept host keys — connections are firewall-restricted to runner IP
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config
          ssh-keyscan -H $API_HOSTS $ADMIN_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run tests
        run: JWT_SECRET=test-secret go test ./...

      - name: Cross-compile binaries for Linux
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o parley-api-linux ./cmd/api
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o parley-admin-linux ./cmd/admin

      - name: Build frontends on runner
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build main frontend
        working-directory: frontend
        run: |
          echo "VITE_SITE_URL=https://${{ vars.DOMAIN }}" > .env
          npm install
          npm run build

      - name: Build admin frontend
        working-directory: admin-frontend
        run: |
          npm install
          npm run build

      - name: Deploy API servers
        env:
          SITE_DOMAIN: ${{ vars.DOMAIN }}
        run: |
          for IP in $API_HOSTS; do
            (
              # Wait for cloud-init to finish on fresh droplets (no-op on subsequent deploys)
              ssh -i ~/.ssh/deploy_key root@$IP "cloud-init status --wait 2>/dev/null || true"
              scp -i ~/.ssh/deploy_key parley-api-linux "root@$IP:/tmp/parley-api"
              ssh -i ~/.ssh/deploy_key root@$IP "mv /tmp/parley-api /usr/local/bin/parley-api && chmod +x /usr/local/bin/parley-api"
              ssh -i ~/.ssh/deploy_key root@$IP "mkdir -p /var/www/parley"
              scp -r -i ~/.ssh/deploy_key frontend/dist/* "root@$IP:/var/www/parley/"
              ssh -i ~/.ssh/deploy_key root@$IP "
                set -e
                # Ensure systemd service exists (cloud-init may have failed on small instances)
                if [ ! -f /etc/systemd/system/parley-api.service ]; then
                  printf '[Unit]\nDescription=Parley API\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nEnvironmentFile=/etc/parley/env\nExecStart=/usr/local/bin/parley-api\nRestart=always\nRestartSec=5\nLimitNOFILE=65536\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/parley-api.service
                  systemctl daemon-reload
                  systemctl enable parley-api
                fi
                # Ensure nginx proxies port 80 -> 8080
                if [ ! -f /etc/nginx/sites-available/parley ]; then
                  apt-get install -y nginx > /dev/null 2>&1 || true
                  printf 'server {\n  listen 80 default_server;\n  root /var/www/parley;\n  index index.html;\n  location /api/ { proxy_pass http://127.0.0.1:8080; proxy_set_header Host \$host; proxy_set_header X-Real-IP \$remote_addr; proxy_http_version 1.1; }\n  location /ws { proxy_pass http://127.0.0.1:8080; proxy_http_version 1.1; proxy_set_header Upgrade \$http_upgrade; proxy_set_header Connection \"upgrade\"; proxy_set_header Host \$host; }\n  location / { try_files \$uri \$uri/ /index.html; }\n}\n' > /etc/nginx/sites-available/parley
                  ln -sf /etc/nginx/sites-available/parley /etc/nginx/sites-enabled/parley
                  rm -f /etc/nginx/sites-enabled/default
                  nginx -t && systemctl reload nginx
                fi
                systemctl restart parley-api
                for i in \$(seq 10); do curl -sf http://localhost:8080/health && break; sleep 2; done || { echo 'Health check failed'; exit 1; }
                echo OK
              "
            ) &
          done
          wait

      - name: Deploy admin server
        env:
          SITE_DOMAIN: ${{ vars.DOMAIN }}
        run: |
          ssh -i ~/.ssh/deploy_key root@$ADMIN_HOST "cloud-init status --wait 2>/dev/null || true"
          scp -i ~/.ssh/deploy_key parley-admin-linux "root@$ADMIN_HOST:/tmp/parley-admin"
          ssh -i ~/.ssh/deploy_key root@$ADMIN_HOST "mv /tmp/parley-admin /usr/local/bin/parley-admin && chmod +x /usr/local/bin/parley-admin"
          ssh -i ~/.ssh/deploy_key root@$ADMIN_HOST "mkdir -p /var/www/parley-admin"
          scp -r -i ~/.ssh/deploy_key admin-frontend/dist/* "root@$ADMIN_HOST:/var/www/parley-admin/"
          ssh -i ~/.ssh/deploy_key root@$ADMIN_HOST "bash -s" <<'REMOTE_SCRIPT'
            set -e
            if [ ! -f /etc/systemd/system/parley-admin.service ]; then
              printf "[Unit]\nDescription=Parley Admin Panel\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/parley\nEnvironmentFile=/etc/parley/admin-env\nExecStart=/usr/local/bin/parley-admin serve\nRestart=always\nRestartSec=5\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n" > /etc/systemd/system/parley-admin.service
              systemctl daemon-reload
              systemctl enable parley-admin
            fi
            systemctl restart parley-admin
            printf "server {\n  listen 80 default_server;\n  location / {\n    proxy_pass http://127.0.0.1:8080;\n    proxy_set_header Host \$host;\n    proxy_set_header X-Real-IP \$remote_addr;\n  }\n}\n" > /etc/nginx/sites-available/parley-admin
            ln -sf /etc/nginx/sites-available/parley-admin /etc/nginx/sites-enabled/parley-admin
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx
            echo OK
          REMOTE_SCRIPT

      - name: Remove runner IP from DO firewalls
        if: always()
        run: |
          RULE=$(jq -n --arg ip "$RUNNER_IP" '{
            "inbound_rules": [{"protocol": "tcp", "ports": "22", "sources": {"addresses": [$ip]}}]
          }')

          curl -sf -X DELETE \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_API_ID/rules" || true

          curl -sf -X DELETE \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_ADMIN_ID/rules" || true

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

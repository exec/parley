name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    env:
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DO_TOKEN: ${{ secrets.DO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve server IPs from DigitalOcean tags
        run: |
          ALL=$(curl -sf \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=parley&per_page=50" \
            | jq -r '.droplets[] | {tags: .tags, ip: (.networks.v4[] | select(.type=="public") | .ip_address)}')
          API_HOSTS=$(echo "$ALL" | jq -r 'select(.tags | contains(["api"])) | .ip' | tr '\n' ' ')
          ADMIN_HOST=$(echo "$ALL" | jq -r 'select(.tags | contains(["admin"])) | .ip' | tr '\n' ' ')
          echo "API_HOSTS=$API_HOSTS" >> "$GITHUB_ENV"
          echo "ADMIN_HOST=$ADMIN_HOST" >> "$GITHUB_ENV"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $API_HOSTS $ADMIN_HOST >> ~/.ssh/known_hosts

      - name: Deploy API servers
        run: |
          for IP in $API_HOSTS; do
            ssh -i ~/.ssh/deploy_key root@$IP '
              set -e
              cd /parley && git pull origin main
              go build -mod=mod -o /usr/local/bin/parley-api ./cmd/api
              cd frontend && npm run build && cp -r dist/* /var/www/parley/
              systemctl restart parley-api
              echo OK
            ' &
          done
          wait

      - name: Deploy admin server
        run: |
          ssh -i ~/.ssh/deploy_key root@$ADMIN_HOST '
            set -e
            cd /parley && git pull origin main
            go build -mod=mod -o /usr/local/bin/parley-admin ./cmd/admin
            systemctl restart parley-admin
            echo OK
          '

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

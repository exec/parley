name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    env:
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DO_TOKEN: ${{ secrets.DO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve server IPs from DigitalOcean tags
        run: |
          ALL=$(curl -sf \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=parley&per_page=50" \
            | jq -r '.droplets[] | {tags: .tags, ip: (.networks.v4[] | select(.type=="public") | .ip_address)}')
          API_HOSTS=$(echo "$ALL" | jq -r 'select(.tags | contains(["api"])) | .ip' | tr '\n' ' ')
          ADMIN_HOST=$(echo "$ALL" | jq -r 'select(.tags | contains(["admin"])) | .ip' | tr '\n' ' ')
          echo "API_HOSTS=$API_HOSTS" >> "$GITHUB_ENV"
          echo "ADMIN_HOST=$ADMIN_HOST" >> "$GITHUB_ENV"

      - name: Allowlist runner IP in DO firewalls
        run: |
          RUNNER_IP=$(curl -sf https://ifconfig.me)/32
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"

          FW_LIST=$(curl -sf -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/firewalls?per_page=50")
          FW_API_ID=$(echo "$FW_LIST" | jq -r '.firewalls[] | select(.name == "parley-api-fw") | .id')
          FW_ADMIN_ID=$(echo "$FW_LIST" | jq -r '.firewalls[] | select(.name == "parley-admin-fw") | .id')
          echo "FW_API_ID=$FW_API_ID" >> "$GITHUB_ENV"
          echo "FW_ADMIN_ID=$FW_ADMIN_ID" >> "$GITHUB_ENV"

          RULE=$(jq -n --arg ip "$RUNNER_IP" '{
            "inbound_rules": [{"protocol": "tcp", "ports": "22", "sources": {"addresses": [$ip]}}]
          }')

          curl -sf -X POST \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_API_ID/rules"

          curl -sf -X POST \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_ADMIN_ID/rules"

          # Wait for firewall rules to propagate
          sleep 5

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $API_HOSTS $ADMIN_HOST >> ~/.ssh/known_hosts

      - name: Run tests
        run: JWT_SECRET=test-secret go test ./...

      - name: Deploy API servers
        run: |
          for IP in $API_HOSTS; do
            ssh -i ~/.ssh/deploy_key root@$IP '
              set -e
              cd /parley && git pull origin main
              go build -mod=mod -o /usr/local/bin/parley-api ./cmd/api
              cd frontend && npm ci && npm run build && cp -r dist/* /var/www/parley/
              systemctl restart parley-api
              for i in $(seq 10); do curl -sf http://localhost:8080/health && break; sleep 2; done || { echo "Health check failed"; exit 1; }
              echo OK
            ' &
          done
          wait

      - name: Deploy admin server
        run: |
          ssh -i ~/.ssh/deploy_key root@$ADMIN_HOST '
            set -e
            export PATH=$PATH:/usr/local/go/bin
            cd /parley && git pull origin main
            go build -mod=mod -o /usr/local/bin/parley-admin ./cmd/admin
            if [ ! -f /etc/systemd/system/parley-admin.service ]; then
              printf "[Unit]\nDescription=Parley Admin Panel\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/parley\nEnvironmentFile=/etc/parley/admin-env\nExecStart=/usr/local/bin/parley-admin serve\nRestart=always\nRestartSec=5\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n" > /etc/systemd/system/parley-admin.service
              systemctl daemon-reload
              systemctl enable parley-admin
            fi
            systemctl restart parley-admin
            echo OK
          '

      - name: Remove runner IP from DO firewalls
        if: always()
        run: |
          RULE=$(jq -n --arg ip "$RUNNER_IP" '{
            "inbound_rules": [{"protocol": "tcp", "ports": "22", "sources": {"addresses": [$ip]}}]
          }')

          curl -sf -X DELETE \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_API_ID/rules" || true

          curl -sf -X DELETE \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RULE" \
            "https://api.digitalocean.com/v2/firewalls/$FW_ADMIN_ID/rules" || true

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

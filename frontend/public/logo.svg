<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- P monogram badge — rounded square -->
  <rect x="4" y="10" width="80" height="80" rx="18" fill="#00b4d8"/>

  <!-- P letterform carved in navy -->
  <!-- Vertical stem -->
  <rect x="22" y="24" width="11" height="52" rx="5.5" fill="#07101e"/>
  <!-- Top bar of bowl -->
  <rect x="33" y="24" width="22" height="10" rx="5" fill="#07101e"/>
  <!-- Bottom bar of bowl (mid) -->
  <rect x="33" y="46" width="22" height="10" rx="5" fill="#07101e"/>
  <!-- Right arc of bowl -->
  <rect x="52" y="34" width="10" height="22" rx="5" fill="#07101e"/>

  <!-- Wordmark: PARLEY -->
  <!-- Using geometric letter paths so it renders identically everywhere -->
  <g filter="url(#glow)" fill="#00b4d8">
    <text
      x="104"
      y="71"
      font-family="'Helvetica Neue', Helvetica, 'Arial', sans-serif"
      font-size="58"
      font-weight="800"
      letter-spacing="-1.5"
    >PARLEY</text>
  </g>
</svg>

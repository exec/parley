<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parley — Negotiate or Die</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Parley — real-time encrypted messaging for the digital seas. Servers, channels, and direct messages." />
  </head>
  <body>
    <script>
  (function(){
    var t=localStorage.getItem('parley-theme')||'rory';
    if(t==='custom'){
      var b=localStorage.getItem('parley-theme-base')||'rory';
      document.body.dataset.theme=b;
      var c=localStorage.getItem('parley-custom-css');
      if(c){var s=document.createElement('style');s.id='custom-theme';s.textContent=c;document.head.appendChild(s);}
    } else {
      document.body.dataset.theme=t;
    }
  })();
</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

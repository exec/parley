services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parley
      POSTGRES_PASSWORD: parley
      POSTGRES_DB: parley
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parley"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass parley
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "parley", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://parley:parley@postgres:5432/parley?sslmode=disable
      JWT_SECRET: dev
      BOT_KEY_SECRET: dev
      SITE_URL: http://localhost:5173
      REDIS_URL: redis://:parley@redis:6379
      PORT: "8081"
    volumes:
      - .:/app
      - go_modules:/root/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_SITE_URL: http://localhost:8081
      API_TARGET: http://api:8081
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  go_modules:
  frontend_modules:

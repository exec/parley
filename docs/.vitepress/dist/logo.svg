<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(40,38)" filter="url(#glow)">
    <!-- Skull cranium -->
    <ellipse cx="0" cy="0" rx="22" ry="20" fill="none" stroke="#32cd32" stroke-width="2"/>
    <!-- Jaw -->
    <path d="M-22 12 Q-22 24 0 24 Q22 24 22 12" fill="none" stroke="#32cd32" stroke-width="1.8"/>
    <!-- Jaw teeth dividers -->
    <line x1="-8" y1="15" x2="-8" y2="24" stroke="#32cd32" stroke-width="1.4"/>
    <line x1="0"  y1="16" x2="0"  y2="25" stroke="#32cd32" stroke-width="1.4"/>
    <line x1="8"  y1="15" x2="8"  y2="24" stroke="#32cd32" stroke-width="1.4"/>
    <!-- Eye sockets -->
    <polygon points="-9,-4 -14,0 -9,4 -4,0"  fill="#32cd32" opacity="0.9"/>
    <polygon points=" 9,-4   4,0  9,4 14,0" fill="#32cd32" opacity="0.9"/>
    <!-- Nose -->
    <polygon points="0,4 -3,9 3,9" fill="#32cd32" opacity="0.7"/>
    <!-- Crossbones -->
    <line x1="-28" y1="32" x2="28" y2="58" stroke="#32cd32" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-28" cy="32" r="4" fill="none" stroke="#32cd32" stroke-width="1.8"/>
    <circle cx="28"  cy="58" r="4" fill="none" stroke="#32cd32" stroke-width="1.8"/>
    <line x1="28" y1="32" x2="-28" y2="58" stroke="#32cd32" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="28"  cy="32" r="4" fill="none" stroke="#32cd32" stroke-width="1.8"/>
    <circle cx="-28" cy="58" r="4" fill="none" stroke="#32cd32" stroke-width="1.8"/>
  </g>
</svg>
